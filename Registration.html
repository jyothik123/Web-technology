<!DOCTYPE html>
<html>
<head>
    <title>Job Registration Form</title>
</head>
<body>

<h2 align="center">Job Registration Form</h2>

<form>

<label>Name:</label><br>
<input type="text" name="name"><br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
<br><br>

<label>Languages Known:</label><br>
<input type="checkbox"> English
<input type="checkbox"> Telugu
<input type="checkbox"> Hindi
<input type="checkbox"> Tamil
<br><br>

<label>Email:</label><br>
<input type="email" name="email"><br><br>

<label>Contact Number:</label><br>
<input type="tel" name="phone"><br><br>

<label>Address:</label><br>
<textarea rows="4" cols="30"></textarea><br><br>

<label>Preferred Job Location:</label><br>
<select>
    <option>Hyderabad</option>
    <option>Bangalore</option>
    <option>Chennai</option>
    <option>Pune</option>
    <option>Mumbai</option>
</select>
<br><br>

<label>About Yourself:</label><br>
<textarea rows="5" cols="30"></textarea><br><br>

<label>Upload CV:</label><br>
<input type="file"><br><br>

<input type="reset" value="Clear">
<input type="submit" value="Submit">

</form>

</body>
</html>
